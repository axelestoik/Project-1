version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=your_remote_db_host
      - DB_PORT=5432
      - DB_USER=your_db_user
      - DB_PASSWORD=your_db_password
      - DB_NAME=your_db_name
      - DB_SSL=true
      - JWT_SECRET=your_super_secret_jwt_token_here
      - GEMINI_API_KEY=${GEMINI_API_KEY}
